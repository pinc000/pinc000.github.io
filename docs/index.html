<!DOCTYPE html>
<html>
  <head>
    <title>Pinc000 API Doc</title>
    <!-- needed for adaptive design -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">

    <!--
    ReDoc doesn't change outer page styles
    -->
    <style>
      body {
        margin: 0;
        padding-top: 40px;
      }
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 100;
      }
      #links_container {
          margin: 0;
          padding: 0;
          background-color: #FFA100;
      }
      #links_container li {
          display: inline-block;
          padding: 10px;
          color: white;
          cursor: pointer;
      }
      </style>
  </head>
  <body>
    <nav>
      <ul id="links_container">
      </ul>
    </nav>

    <redoc scroll-y-offset="body > nav"></redoc>

    <script src="scripts/redoc.standalone.js"> </script>
    
    
      <script>
        function findGetParameter(parameterName) {
          var result = null,
              tmp = [];
          location.search
              .substr(1)
              .split("&")
              .forEach(function (item) {
                tmp = item.split("=");
                if (tmp[0] === parameterName) result = decodeURIComponent(tmp[1]);
              });
          return result;
		}
		var param = findGetParameter("api");
		var isTest = findGetParameter("isTest");
        var currentPath = window.location.pathname
          .replace(/\/index\.html$/, '')
          .replace(/\/$/, '');
        var docsBasePath = currentPath === '' ? '' : currentPath;
        var specBasePath = docsBasePath + '/' + (isTest === 'true' ? 'OpenAPI/testing-branch' : 'OpenAPI');
        // list of APIS
        var apis = [
          {
            name: 'Customer API',
            url: specBasePath + '/customerapi.yaml'
          },
          {
            name: 'Lines API',
            url: specBasePath + '/linesapi.yaml'
          },  
          {
            name: 'Bets API',
            url: specBasePath + '/betsapi.yaml'
          }    
        ];
        // initially render first API
        Redoc.init(apis[param === 'lines' ? 1 : (param === 'bets' ? 2 : 0) ].url);
        function onClick() {
          var url = this.getAttribute('data-link');
          Redoc.init(url);
        }
        // dynamically building navigation items
        var $list = document.getElementById('links_container');
        apis.forEach(function(api) {
          var $listitem = document.createElement('li');
          $listitem.setAttribute('data-link', api.url);
          $listitem.innerText = api.name;
          $listitem.addEventListener('click', onClick);
          $list.appendChild($listitem);
        });
    </script>
    
  </body>
</html>
