<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Affiliate Odds</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }
    pre {
      background-color: #f4f4f4;
      padding: 10px;
      overflow-x: auto;
    }
    code {
      background-color: #f0f0f0;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="content"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const markdownFile = 'https://raw.githubusercontent.com/Pinny888/api-spec/refs/heads/main/OpenAPI/AffiliatesOdds.md';

    fetch(markdownFile)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }
        return response.text();
      })
      .then(mdText => {
        document.getElementById('content').innerHTML = marked.parse(mdText);
      })
      .catch(error => {
        document.getElementById('content').innerHTML = `<p style="color:red;">Error loading markdown file: ${error}</p>`;
      });
  </script>
</body>
</html>
