<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pinc000 · Pinnacle API</title>
    <meta name="description" content="Interactive API reference for the Pinc000 Pinnacle API." />
    <link rel="icon" type="image/png" href="./pinc000.png" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <!-- Load Scalar -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

    <!-- Initialize the API Reference -->
    <script>
      Scalar.createApiReference('#app', {
        // Same-origin spec, refreshed at deploy time by the Pages workflow
        url: './openapi.json',
      })
    </script>
  </body>
</html>
