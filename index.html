<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pinc000 · Pinnacle API</title>
    <meta name="description" content="Interactive API reference for the Pinc000 Pinnacle API." />
    <link rel="icon" type="image/png" href="./pinc000.png" />
    <style>
      body {
        margin: 0;
        padding: 0;
      }

      /* Hide the "API docs by Redocly" attribution. Verified empirically on
         redoc@2.5.3: it renders as <a href="https://redocly.com/redoc/"> at
         the bottom of the sidebar menu; !important is required because
         Redoc's styled-components sheet (display: flex) is injected after
         this one and would win the cascade. */
      a[href*="redocly.com/redoc"] {
        display: none !important;
      }

      /* Hide the big "Pinnacle API (1.0.0)" heading. Verified empirically on
         redoc@2.5.3: the info section renders as <div class="api-info"> with
         the title as its only <h1>; the description is a sibling of the h1,
         so it stays visible. */
      .api-info h1 {
        display: none;
      }

      /* Credential form, mounted into the #pinc-try marker that the backend
         embeds in info.description. Styled to sit in Redoc's typography. */
      #pinc-try .pinc-row {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin: 4px 0 8px;
      }
      #pinc-try input {
        padding: 7px 10px;
        border: 1px solid #d5d5d5;
        border-radius: 4px;
        font-size: 14px;
        font-family: inherit;
        width: 150px;
      }
      #pinc-try input:focus {
        outline: none;
        border-color: #ff5500;
      }
      #pinc-try button {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        background: #ff5500;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
      }
      #pinc-try button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #pinc-try .pinc-status {
        font-size: 14px;
      }
      #pinc-try .pinc-status.ok {
        color: #1d8348;
      }
      #pinc-try .pinc-status.err {
        color: #c0392b;
      }

      /* "Run" button, injected next to Redoc's Copy button in every curl
         sample's button bar (see injectRunButtons for the anchor). The bar
         itself carries opacity: .7, so the resting tint is lightened. */
      .pinc-run {
        padding: 2px 10px;
        border: 0;
        background: transparent;
        color: #ffa07a;
        font-size: 14px;
        font-family: inherit;
        cursor: pointer;
      }
      .pinc-run:hover {
        color: #ff5500;
      }

      /* Blur for the junk credentials shown in code samples. The span only
         ever contains random [a-zA-Z0-9] junk — the real value is never in
         the DOM — so the blur is presentation, not the protection. Syntax
         color is inherited from the Prism token span the junk sits inside. */
      .pinc-blur {
        filter: blur(3.5px);
        letter-spacing: 1px;
        /* Unselectable: a hand-made selection would otherwise copy the junk
           (or a fragment of it, which the copy rewrite cannot map back).
           The copy listener refills the skipped credentials, so a manual
           copy still yields a working command. */
        -webkit-user-select: none;
        user-select: none;
      }

      /* Live-response panel rendered under a sample after Run. Dark to match
         Redoc's right column; the accent stays the pinc000 orange. */
      .pinc-resp {
        margin-top: 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-left: 3px solid #ff5500;
        border-radius: 4px;
        background: #11171a;
        font-family: Courier, monospace;
        font-size: 13px;
      }
      .pinc-resp-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        color: #8be9a8;
      }
      .pinc-resp-head.neutral {
        color: #d5dee5;
      }
      .pinc-resp-head.err {
        color: #ff8f80;
        background: rgba(255, 60, 40, 0.08);
      }
      .pinc-resp-close {
        background: none;
        border: 0;
        color: rgba(255, 255, 255, 0.55);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        padding: 0 2px;
      }
      .pinc-resp-close:hover {
        color: #fff;
      }
      .pinc-resp pre {
        margin: 0;
        padding: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        max-height: 300px;
        overflow: auto;
        color: #fff;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>

  <body>
    <div id="redoc"></div>

    <!-- Pin exactly 2.5.3: the credential injection below relies on this
         version's DOM (init callback timing, .api-info, attribution href). -->
    <script src="https://cdn.jsdelivr.net/npm/redoc@2.5.3/bundles/redoc.standalone.js"></script>
    <script>
      "use strict";

      var container = document.getElementById("redoc");

      Redoc.init(
        "./openapi.json",
        {
          hideDownloadButtons: true,
          expandResponses: "200",
          hideSingleRequestSampleTab: true,
          theme: {
            /* Logo-size bug, diagnosed empirically on redoc@2.5.3: Redoc
               applies `gutter` as padding on the <img> with border-box
               sizing, and maxHeight limits the BORDER box — so the old
               `maxHeight: 40px, gutter: 16px` painted the 400×400 pinc000.png
               at just 8×8px. maxHeight must be image size + 2×gutter:
               84 − 2×14 = a 56×56 visible logo with comfortable padding. */
            logo: { maxHeight: "84px", gutter: "14px" },
            colors: { primary: { main: "#ff5500" } }, // dominant orange of pinc000.png
          },
        },
        container,
        initCredInjection
      );

      /* Credential injection: the spec's code samples contain the literal
         tokens {{PINC_USER}} / {{PINC_PASS}}; we substitute the visitor's
         credentials in-place so every sample is copy-paste runnable — shown
         on screen only as blurred junk, restored to the real values on copy. */
      function initCredInjection() {
        var USER_KEY = "pincUser"; // username may persist across sessions...
        var PASS_KEY = "pincPass"; // ...but the password only lives in sessionStorage

        function render(tpl) {
          return tpl
            .replaceAll("{{PINC_USER}}", localStorage.getItem(USER_KEY) || "USERNAME")
            .replaceAll("{{PINC_PASS}}", sessionStorage.getItem(PASS_KEY) || "PASSWORD");
        }

        /* Safe blur: a real credential must NEVER appear in the DOM. Each
           entered value is displayed as JUNK — a random string of the same
           length — inside a blurred span. The junk is cached per real value,
           so every applyCreds pass renders byte-identical DOM and the
           MutationObserver below settles instead of looping. Junk is drawn
           from [a-zA-Z0-9] only, so it cannot break out of the quoted
           context when parseCurl tokenizes pre.textContent. */
        var JUNK_CHARS =
          "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        var junkCache = Object.create(null); // real value -> stable junk
        var junkToReal = Object.create(null); // junk -> real, for the copy rewrite

        function junkFor(real) {
          var junk = junkCache[real];
          if (junk === undefined) {
            junk = "";
            for (var i = 0; i < real.length; i++)
              junk += JUNK_CHARS.charAt(Math.floor(Math.random() * JUNK_CHARS.length));
            junkCache[real] = junk;
            junkToReal[junk] = real;
          }
          return junk;
        }

        /* Substitute credentials into the code samples. Verified empirically
           on redoc@2.5.3: x-codeSamples render as a bare <pre> of Prism token
           <span>s (no <code> element), with each token inside a single text
           node. On first touch each templated text node is REPLACED by a
           <span class="pinc-sub"> carrying the original template as an
           expando; each pass then re-renders that span's children from the
           template — plain text parts as text nodes, credential tokens as
           the readable USERNAME/PASSWORD placeholders while the fields are
           empty, or as blurred-junk spans once real values are entered.
           Sitting inside the Prism token span, the children inherit its
           syntax color. A per-span signature (the current credential pair —
           junk is a pure function of it) short-circuits unchanged
           re-renders, so the childList MutationObserver below settles after
           one extra cycle instead of feeding back. TEXTAREA text nodes are
           left untouched: Redoc's hidden copy textarea must keep the raw
           template for the copy listener. */
        function renderSub(span, sig, u, p) {
          if (span.pincSig === sig) return; // unchanged → zero mutations
          span.pincSig = sig;
          span.textContent = "";
          var parts = span.pincTpl.split(/(\{\{PINC_USER\}\}|\{\{PINC_PASS\}\})/);
          for (var i = 0; i < parts.length; i++) {
            var real = null;
            var placeholder = null;
            if (parts[i] === "{{PINC_USER}}") {
              real = u;
              placeholder = "USERNAME";
            } else if (parts[i] === "{{PINC_PASS}}") {
              real = p;
              placeholder = "PASSWORD";
            }
            if (real === null) {
              if (parts[i]) span.appendChild(document.createTextNode(parts[i]));
            } else if (real === "") {
              span.appendChild(document.createTextNode(placeholder));
            } else {
              var blur = document.createElement("span");
              blur.className = "pinc-blur";
              blur.textContent = junkFor(real); // junk only — never the real value
              span.appendChild(blur);
            }
          }
        }

        function applyCreds() {
          var toConvert = [];
          var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
          for (var node; (node = walker.nextNode()); ) {
            if (node.nodeValue.indexOf("{{PINC_") === -1) continue;
            if (node.parentNode && node.parentNode.tagName === "TEXTAREA") continue;
            toConvert.push(node); // convert after the walk, not mid-walk
          }
          for (var i = 0; i < toConvert.length; i++) {
            var sub = document.createElement("span");
            sub.className = "pinc-sub";
            sub.pincTpl = toConvert[i].nodeValue;
            toConvert[i].parentNode.replaceChild(sub, toConvert[i]);
          }
          var u = localStorage.getItem(USER_KEY) || "";
          var p = sessionStorage.getItem(PASS_KEY) || "";
          var sig = u + "\u0000" /* NUL cannot appear in an input value */ + p;
          var subs = container.getElementsByClassName("pinc-sub");
          for (var s = 0; s < subs.length; s++) renderSub(subs[s], sig, u, p);
        }

        // Redoc re-mounts sample panels on tab switches; re-substitute and
        // re-inject Run buttons then (both passes are idempotent, so the
        // mutations caused by injection itself settle after one extra cycle).
        new MutationObserver(function () {
          applyCreds();
          injectRunButtons();
        }).observe(container, { childList: true, subtree: true });
        applyCreds();
        injectRunButtons();

        /* Fix copying — three paths, all must yield the REAL credentials:
           1. Redoc's Copy button copies the ORIGINAL spec string via a
              hidden <textarea> + execCommand; its text still carries the raw
              {{PINC_*}} tokens (applyCreds skips TEXTAREA text nodes exactly
              for this), so tokens are substituted here.
           2. A manual selection of visible sample text now contains the
              blurred JUNK strings; those are mapped back to the real values.
           Verified empirically on redoc@2.5.3: during the Copy-button copy
           the event target is the hidden TEXTAREA, window.getSelection()
           DOES return its raw template text, and e.clipboardData is
           available — so a capture-phase document listener can rewrite the
           payload. Text with neither tokens nor junk passes through. */
        function rewriteForCopy(text) {
          var out = render(text);
          // Longest junk first, so a shorter junk that happens to be a
          // substring of a longer one cannot corrupt it mid-replacement.
          var junks = Object.keys(junkToReal).sort(function (a, b) {
            return b.length - a.length;
          });
          for (var i = 0; i < junks.length; i++)
            out = out.replaceAll(junks[i], junkToReal[junks[i]]);
          // 3. A hand-made selection SKIPS the unselectable junk spans and
          //    arrives here as `-u ':'` (the quotes and colon are plain
          //    text). Refill it so even a manual copy is a working command.
          var u = localStorage.getItem(USER_KEY) || "";
          var p = sessionStorage.getItem(PASS_KEY) || "";
          if (u && p) out = out.replaceAll("-u ':'", "-u '" + u + ":" + p + "'");
          return out;
        }
        document.addEventListener(
          "copy",
          function (e) {
            var text = String(window.getSelection());
            if (text.indexOf("{{PINC_") === -1) {
              // Defensive fallback: some engines exclude textarea content
              // from the document selection; read the field directly.
              var ae = document.activeElement;
              if (ae && ae.tagName === "TEXTAREA" && typeof ae.value === "string")
                text = ae.value.substring(ae.selectionStart, ae.selectionEnd);
            }
            var out = rewriteForCopy(text);
            if (out !== text && e.clipboardData) {
              e.preventDefault();
              e.clipboardData.setData("text/plain", out);
            }
          },
          true
        );

        /* --- Run buttons: execute a curl sample live, show the response --- */

        /* Minimal POSIX-ish shell tokenizer: '…'/"…" quoting, backslash
           escapes and line continuations, and # comments (only at the start
           of a word, like a real shell). Enough for the x-codeSamples curl
           strings, which are plain single-command invocations. */
        function shellTokens(src) {
          var toks = [];
          var cur = null; // null = between words; '' = an (possibly empty) open word
          var q = null; // active quote char, or null
          for (var i = 0; i < src.length; i++) {
            var c = src.charAt(i);
            if (q) {
              if (c === q) q = null;
              else if (q === '"' && c === "\\" && '"\\$`'.indexOf(src.charAt(i + 1)) !== -1)
                cur += src.charAt(++i);
              else cur += c;
            } else if (c === "\\") {
              if (src.charAt(i + 1) === "\n") i++; // line continuation
              else cur = (cur === null ? "" : cur) + src.charAt(++i);
            } else if (c === "'" || c === '"') {
              q = c;
              if (cur === null) cur = "";
            } else if (c === "#" && cur === null) {
              while (i < src.length && src.charAt(i) !== "\n") i++; // comment
            } else if (" \t\r\n".indexOf(c) !== -1) {
              if (cur !== null) toks.push(cur);
              cur = null;
            } else {
              cur = (cur === null ? "" : cur) + c;
            }
          }
          if (cur !== null) toks.push(cur);
          return toks;
        }

        /* Parse one curl invocation into {method, url, headers, body}.
           Credentials flags (-u) are deliberately ignored — Run always
           authenticates with the current credential fields. Returns null for
           non-curl text (e.g. Redoc's JSON payload samples). Exposed on
           window (pincParseCurl) so it can be unit-tested in-page. */
        function parseCurl(sample) {
          var toks = shellTokens(sample);
          var start = toks.indexOf("curl");
          if (start === -1) return null;
          var req = { method: null, url: null, headers: {}, body: null };
          var FLAGS = {
            "-X": "method",
            "--request": "method",
            "-H": "header",
            "--header": "header",
            "-d": "body",
            "--data": "body",
            "--data-raw": "body",
            "--data-binary": "body",
            "--url": "url",
            "-u": "skip",
            "--user": "skip",
          };
          for (var i = start + 1; i < toks.length; i++) {
            var kind = FLAGS[toks[i]];
            if (kind) {
              var v = toks[++i];
              if (v === undefined) continue;
              if (kind === "method") req.method = v.toUpperCase();
              else if (kind === "url") req.url = v;
              else if (kind === "body") req.body = v;
              else if (kind === "header") {
                var ci = v.indexOf(":");
                if (ci !== -1) req.headers[v.slice(0, ci).trim()] = v.slice(ci + 1).trim();
              }
            } else if (toks[i].charAt(0) === "-") {
              // boolean flag (-s, --compressed, …): no argument to consume
            } else if (req.url === null) {
              req.url = toks[i];
            }
          }
          if (req.url === null) return null;
          if (req.method === null) req.method = req.body === null ? "GET" : "POST";
          return req;
        }
        window.pincParseCurl = parseCurl;

        // fetch() over HTTP/2 reports an empty statusText; fill in the common ones.
        var STATUS_TEXT = {
          200: "OK", 201: "Created", 202: "Accepted", 204: "No Content",
          400: "Bad Request", 401: "Unauthorized", 402: "Payment Required",
          403: "Forbidden", 404: "Not Found", 409: "Conflict",
          422: "Unprocessable Entity", 429: "Too Many Requests",
          500: "Internal Server Error", 502: "Bad Gateway", 503: "Service Unavailable",
        };

        function runSample(pre) {
          var wrap = pre.parentElement;
          var old = wrap.querySelector(".pinc-resp");
          if (old) old.remove();
          var panel = document.createElement("div");
          panel.className = "pinc-resp";
          wrap.appendChild(panel);

          function show(cls, head, body) {
            panel.innerHTML = "";
            var headEl = document.createElement("div");
            headEl.className = "pinc-resp-head" + (cls ? " " + cls : "");
            var label = document.createElement("span");
            label.textContent = head;
            var close = document.createElement("button");
            close.type = "button";
            close.className = "pinc-resp-close";
            close.textContent = "×";
            close.addEventListener("click", function () {
              panel.remove();
            });
            headEl.appendChild(label);
            headEl.appendChild(close);
            panel.appendChild(headEl);
            if (body != null && body !== "") {
              var bodyEl = document.createElement("pre");
              bodyEl.textContent = body;
              panel.appendChild(bodyEl);
            }
          }

          var u = localStorage.getItem(USER_KEY) || "";
          var p = sessionStorage.getItem(PASS_KEY) || "";
          if (!u || !p) {
            show("err", "Enter your credentials at the top first", null);
            return;
          }
          var req = parseCurl(pre.textContent);
          if (!req) {
            show("err", "Could not parse this sample", null);
            return;
          }
          var headers = {};
          for (var k in req.headers)
            if (k.toLowerCase() !== "authorization") headers[k] = req.headers[k];
          headers["Authorization"] = "Basic " + btoa(u + ":" + p);

          show("neutral", "Running…", null);
          var t0 = performance.now();
          fetch(req.url, { method: req.method, headers: headers, body: req.body })
            .then(function (res) {
              var ms = Math.round(performance.now() - t0);
              return res.text().then(function (text) {
                var body = text;
                var dataAge = "";
                try {
                  var parsed = JSON.parse(text);
                  body = JSON.stringify(parsed, null, 2);
                  /* Polling responses carry `last` — the epoch-ms timestamp
                     of when the data was current. Age it against the SERVER
                     clock from the response's Date header (the API exposes it
                     via Access-Control-Expose-Headers), so a wrong client
                     clock cannot skew the number. Date has 1 s resolution and
                     truncates down, so a fresh `last` can land up to ~1 s
                     "in the future" — clamp to 0. Only if the header is
                     unreadable fall back to the client clock, where a clock
                     running behind yields a negative age — report that as
                     skew instead of a nonsense negative. */
                  if (parsed && typeof parsed.last === "number" && parsed.last > 1e12) {
                    var fmt = function (ms) {
                      return ms < 1000 ? ms + " ms" : (ms / 1000).toFixed(1) + " s";
                    };
                    var serverNow = Date.parse(res.headers.get("Date") || "");
                    var age;
                    if (!isNaN(serverNow)) {
                      age = Math.max(0, serverNow - parsed.last);
                      dataAge = " · data " + fmt(age) + " old";
                    } else {
                      age = Date.now() - parsed.last;
                      dataAge =
                        age >= 0
                          ? " · data " + fmt(age) + " old"
                          : " · data fresh (client clock ~" + fmt(-age) + " behind)";
                    }
                  }
                } catch (ignore) {}
                var reason = res.statusText || STATUS_TEXT[res.status] || "";
                show(
                  res.status >= 400 ? "err" : "",
                  res.status + (reason ? " " + reason : "") + " · " + ms + " ms" + dataAge,
                  body
                );
              });
            })
            .catch(function () {
              show("err", "Network error — could not reach the API", null);
            });
        }

        /* Inject Run next to Redoc's Copy button. Anchor (verified
           empirically on redoc@2.5.3): every code sample renders as
             <div> <div>(button bar: <button>Copy</button>)</div> <pre>…</pre> </div>
           i.e. the sample <pre>'s previousElementSibling is the button bar.
           The sc-* classnames are styled-components hashes, so we match this
           structure instead of classes. Only <pre>s that parse as curl get a
           button (Redoc's JSON payload samples also have Copy bars, and our
           own response panels contain <pre>s — both are skipped). Idempotent
           via the .pinc-run check, so the MutationObserver can re-run it
           after Redoc remounts a tab panel. */
        function injectRunButtons() {
          var pres = container.getElementsByTagName("pre");
          for (var i = 0; i < pres.length; i++) {
            var pre = pres[i];
            var bar = pre.previousElementSibling;
            if (!bar || bar.tagName !== "DIV" || bar.querySelector(".pinc-run")) continue;
            var isCopyBar = false;
            var btns = bar.getElementsByTagName("button");
            for (var j = 0; j < btns.length; j++)
              if (btns[j].textContent.trim() === "Copy") isCopyBar = true;
            if (!isCopyBar || !parseCurl(pre.textContent)) continue;
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "pinc-run";
            btn.textContent = "Run";
            btn.addEventListener("click", runSample.bind(null, pre));
            bar.appendChild(btn);
          }
        }

        var host = document.getElementById("pinc-try");
        if (!host) return; // older spec without the marker: substitution still works

        host.innerHTML =
          '<div class="pinc-row">' +
          '<input class="pinc-user" type="text" placeholder="Username" autocomplete="username">' +
          '<input class="pinc-pass" type="password" placeholder="Password" autocomplete="current-password">' +
          '<button type="button" class="pinc-check">Check</button>' +
          '<span class="pinc-status"></span>' +
          "</div>";

        var user = host.querySelector(".pinc-user");
        var pass = host.querySelector(".pinc-pass");
        var check = host.querySelector(".pinc-check");
        var status = host.querySelector(".pinc-status");

        user.value = localStorage.getItem(USER_KEY) || "";
        pass.value = sessionStorage.getItem(PASS_KEY) || "";

        user.addEventListener("input", function () {
          localStorage.setItem(USER_KEY, user.value);
          applyCreds();
        });
        pass.addEventListener("input", function () {
          sessionStorage.setItem(PASS_KEY, pass.value);
          applyCreds();
        });

        function setStatus(cls, text) {
          status.className = "pinc-status " + cls;
          status.textContent = text;
        }

        check.addEventListener("click", function () {
          check.disabled = true;
          setStatus("", "…");
          fetch("https://api.pinc000.com/balance", {
            headers: { Authorization: "Basic " + btoa(user.value + ":" + pass.value) },
          })
            .then(function (res) {
              if (res.status === 401) return setStatus("err", "✗ Invalid credentials");
              if (!res.ok) return setStatus("err", "✗ API error (HTTP " + res.status + ")");
              return res.json().then(function (b) {
                var extra =
                  b && b.availableBalance != null
                    ? " — " + b.availableBalance + (b.currency ? " " + b.currency : "")
                    : "";
                setStatus("ok", "✓ Connected" + extra);
              });
            })
            .catch(function () {
              setStatus("err", "✗ Could not reach the API");
            })
            .finally(function () {
              check.disabled = false;
            });
        });
      }
    </script>
  </body>
</html>
